<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Enrolled Users - OTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">OTS Admin</a>
        </div>
    </nav>
    <div class="container mt-4">
        <div th:if="${param.unenrollSuccess}" class="alert alert-success alert-dismissible fade show" role="alert">
            Student unenrolled successfully!
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${param.unassignSuccess}" class="alert alert-success alert-dismissible fade show" role="alert">
            Teacher unassigned successfully!
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>Enrolled Users for: <span th:text="${course.name}"></span></h3>
            <a href="/admin/dashboard" class="btn btn-secondary btn-sm">Back to Dashboard</a>
        </div>

        <div class="card p-3 shadow-sm mb-4">
            <h5>Assigned Teacher</h5>
            <table class="table">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${teacher != null}">
                        <td th:text="${teacher.id}"></td>
                        <td th:text="${teacher.username}"></td>
                        <td th:text="${teacher.email}"></td>
                        <td>
                            <form th:action="@{/admin/unassign-teacher}" method="post" onsubmit="return confirm('Remove teacher from this course?');">
                                <input type="hidden" name="courseId" th:value="${course.id}">
                                <button type="submit" class="btn btn-warning btn-sm">Remove</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${teacher == null}">
                        <td colspan="4" class="text-center text-muted">No teacher assigned.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card p-3 shadow-sm">
            <h5>Enrolled Students</h5>
            <table class="table table-striped">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.id}"></td>
                        <td th:text="${student.username}"></td>
                        <td th:text="${student.email}"></td>
                        <td>
                            <form th:action="@{/admin/unenroll}" method="post" onsubmit="return confirm('Remove student from this course?');">
                                <input type="hidden" name="studentId" th:value="${student.id}">
                                <input type="hidden" name="courseId" th:value="${course.id}">
                                <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="4" class="text-center text-muted">No students enrolled.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
