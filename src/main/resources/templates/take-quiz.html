<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Take Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script th:inline="javascript">
        // Simple countdown timer
        function startTimer(duration, display) {
            var timer = duration, minutes, seconds;
            setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    timer = 0;
                    document.getElementById("quizForm").submit();
                }
            }, 1000);
        }

        window.onload = function () {
            var timeLimit = /*[[${quiz.timeLimitMinutes ?: 0}]]*/ 0;
            var display = document.querySelector('#time');
            startTimer(timeLimit * 60, display);
        };
    </script>
</head>

<body class="bg-light">
    <div class="sticky-top bg-white border-bottom p-3 shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 th:text="${quiz.title}"></h4>
            <h4 class="text-danger">Time Left: <span id="time">00:00</span></h4>
        </div>
    </div>

    <div class="container mb-5">
        <form id="quizForm" th:action="@{/student/submit-quiz}" method="post">
            <input type="hidden" name="quizId" th:value="${quiz.id}">

            <div th:each="q, stat : ${quiz.questions}" class="card p-4 mb-3 shadow-sm">
                <h5 th:text="${stat.count + '. ' + q.text}"></h5>

                <div class="mt-3">
                    <div th:each="opt : ${q.options}" class="form-check mb-2">
                        <input class="form-check-input" type="radio" th:name="'question_' + ${q.id}"
                            th:value="${opt.id}" th:id="'opt_' + ${opt.id}">
                        <label class="form-check-label" th:for="'opt_' + ${opt.id}" th:text="${opt.text}"></label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">Submit Quiz</button>
        </form>
    </div>
</body>

</html>
