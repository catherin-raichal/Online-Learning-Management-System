<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow-sm">
            <h3>Create Quiz for <span th:text="${course.name}"></span></h3>
            <form th:action="@{/teacher/create-quiz}" method="post">
                <input type="hidden" name="courseId" th:value="${course.id}">

                <div class="mb-3">
                    <label class="form-label">Quiz Title</label>
                    <input type="text" name="title" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Time Limit (Minutes)</label>
                    <input type="number" name="timeLimit" class="form-control" value="10" required>
                </div>

                <button type="submit" class="btn btn-primary">Create & Add Questions</button>
            </form>
        </div>
    </div>
</body>

</html>
