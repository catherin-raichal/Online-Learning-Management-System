<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h3 class="text-center mb-4">Edit Course</h3>
                    <form th:action="@{/admin/edit-course}" method="post">
                        <input type="hidden" name="courseId" th:value="${course.id}">
                        <div class="mb-3">
                            <label class="form-label">Course Name</label>
                            <input type="text" name="name" class="form-control" th:value="${course.name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" required
                                th:text="${course.description}"></textarea>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Update Course</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/admin/dashboard">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
