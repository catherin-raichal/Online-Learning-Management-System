<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Pending Submissions - OLM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand">OLM - Teacher Panel</span>
    </nav>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>Pending Submissions for: <span th:text="${assignment.title}"></span></h3>
            <a href="/dashboard" class="btn btn-secondary btn-sm">Back to Dashboard</a>
        </div>

        <div class="card p-3 shadow-sm">
            <h5 class="text-danger mb-3">Students Yet to Submit</h5>
            <table class="table table-hover table-striped">
                <thead class="table-danger">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${pendingStudents}">
                        <td th:text="${student.id}"></td>
                        <td th:text="${student.username}"></td>
                        <td th:text="${student.email}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pendingStudents)}">
                        <td colspan="3" class="text-center text-muted">All enrolled students have submitted their tasks!
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
