<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            Error: <span th:text="${param.error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${param.deleted}" class="alert alert-success alert-dismissible fade show" role="alert">
            Question deleted successfully!
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm mb-3">
                    <h3>Add Question to: <span th:text="${quiz.title}"></span></h3>
                    <form th:action="@{/teacher/add-question}" method="post">
                        <input type="hidden" name="quizId" th:value="${quiz.id}">

                        <div class="mb-3">
                            <label class="form-label">Question Text</label>
                            <textarea name="text" class="form-control" required></textarea>
                        </div>

                        <div class="mb-2 input-group">
                            <div class="input-group-text">
                                <input class="form-check-input mt-0" type="checkbox" name="correct1" value="true">
                            </div>
                            <input type="text" name="option1" class="form-control" placeholder="Option 1" required>
                        </div>
                        <div class="mb-2 input-group">
                            <div class="input-group-text">
                                <input class="form-check-input mt-0" type="checkbox" name="correct2" value="true">
                            </div>
                            <input type="text" name="option2" class="form-control" placeholder="Option 2" required>
                        </div>
                        <div class="mb-2 input-group">
                            <div class="input-group-text">
                                <input class="form-check-input mt-0" type="checkbox" name="correct3" value="true">
                            </div>
                            <input type="text" name="option3" class="form-control" placeholder="Option 3" required>
                        </div>
                        <div class="mb-3 input-group">
                            <div class="input-group-text">
                                <input class="form-check-input mt-0" type="checkbox" name="correct4" value="true">
                            </div>
                            <input type="text" name="option4" class="form-control" placeholder="Option 4" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Add Question</button>
                    </form>
                </div>
                <a th:href="@{/dashboard}" class="btn btn-secondary">Done / Back to Dashboard</a>
            </div>

            <div class="col-md-6">
                <h3>Existing Questions</h3>
                <div th:each="q, stat : ${quiz.questions}" class="card p-3 mb-2">
                    <div class="d-flex justify-content-between">
                        <strong th:text="${stat.count + '. ' + q.text}"></strong>
                        <div>
                            <a th:href="@{/teacher/edit-question(questionId=${q.id})}"
                                class="btn btn-sm btn-warning">Edit</a>
                            <form th:action="@{/teacher/delete-question}" method="post" class="d-inline"
                                onsubmit="return confirm('Delete this question?');">
                                <input type="hidden" name="questionId" th:value="${q.id}">
                                <input type="hidden" name="quizId" th:value="${quiz.id}">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </div>
                    </div>
                    <ul class="list-group list-group-flush mt-2">
                        <li th:each="opt : ${q.options}" class="list-group-item"
                            th:classappend="${opt.correct} ? 'list-group-item-success' : ''">
                            <span th:text="${opt.text}"></span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
