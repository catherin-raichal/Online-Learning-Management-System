<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Question</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow-sm" style="max-width: 600px; margin: auto;">
            <h3 class="mb-4">Edit Question</h3>
            <form th:action="@{/teacher/edit-question}" method="post">
                <input type="hidden" name="questionId" th:value="${question.id}">

                <div class="mb-3">
                    <label class="form-label">Question Text</label>
                    <textarea name="text" class="form-control" rows="3" required th:text="${question.text}"></textarea>
                </div>

                <h5 class="mb-3">Options</h5>

                <!-- Option 1 -->
                <div class="mb-2 input-group">
                    <div class="input-group-text">
                        <input class="form-check-input mt-0" type="checkbox" name="correct1" value="true"
                            th:checked="${question.options[0].correct}">
                    </div>
                    <input type="text" name="option1" class="form-control" th:value="${question.options[0].text}"
                        required>
                </div>

                <!-- Option 2 -->
                <div class="mb-2 input-group">
                    <div class="input-group-text">
                        <input class="form-check-input mt-0" type="checkbox" name="correct2" value="true"
                            th:checked="${question.options[1].correct}">
                    </div>
                    <input type="text" name="option2" class="form-control" th:value="${question.options[1].text}"
                        required>
                </div>

                <!-- Option 3 -->
                <div class="mb-2 input-group">
                    <div class="input-group-text">
                        <input class="form-check-input mt-0" type="checkbox" name="correct3" value="true"
                            th:checked="${question.options[2].correct}">
                    </div>
                    <input type="text" name="option3" class="form-control" th:value="${question.options[2].text}"
                        required>
                </div>

                <!-- Option 4 -->
                <div class="mb-2 input-group">
                    <div class="input-group-text">
                        <input class="form-check-input mt-0" type="checkbox" name="correct4" value="true"
                            th:checked="${question.options[3].correct}">
                    </div>
                    <input type="text" name="option4" class="form-control" th:value="${question.options[3].text}"
                        required>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                    <a th:href="@{/teacher/view-quiz(quizId=${question.quiz.id})}"
                        class="btn btn-secondary w-100 mt-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
