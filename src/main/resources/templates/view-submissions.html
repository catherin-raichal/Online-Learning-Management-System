<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Submissions - OTS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <div class="container mt-4">
        <h1>Submissions for <span th:text="${assignment.title}"></span></h1>
        <a href="/dashboard" class="btn btn-secondary mb-3">Back to Dashboard</a>

        <table class="table table-bordered bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Student</th>
                    <th>Date</th>
                    <th>File</th>
                    <th>Grade</th>
                    <th>Feedback</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="submission : ${submissions}">
                    <td th:text="${submission.student.username}"></td>
                    <td th:text="${submission.submissionDate}"></td>
                    <td><a th:href="@{'/files/' + ${submission.filePath}}" target="_blank">View File</a></td>
                    <td th:text="${submission.grade ?: 'N/A'}"></td>
                    <td th:text="${submission.feedback ?: 'No feedback yet'}"></td>
                    <td>
                        <form th:action="@{/teacher/grade}" method="post" class="d-flex gap-2">
                            <input type="hidden" name="submissionId" th:value="${submission.id}">
                            <input type="text" name="grade" class="form-control form-control-sm" placeholder="Grade"
                                required>
                            <input type="text" name="feedback" class="form-control form-control-sm"
                                placeholder="Feedback">
                            <button type="submit" class="btn btn-success btn-sm">Update</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
