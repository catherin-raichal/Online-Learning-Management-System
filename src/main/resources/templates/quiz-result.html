<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quiz Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5 text-center">
        <div class="card p-5 shadow">
            <h1 class="text-primary mb-4">Quiz Result</h1>
            <h3>You scored</h3>
            <h1 class="display-1 fw-bold text-success">
                <span th:text="${result.score}"></span> / <span th:text="${result.totalQuestions}"></span>
            </h1>
            <p class="text-muted mt-3">Submitted on <span
                    th:text="${#temporals.format(result.submissionTime, 'dd-MMM-yyyy HH:mm')}"></span></p>

            <hr class="my-4">

            <div class="text-start">
                <h3 class="mb-4">Detailed Results</h3>
                <div th:each="answer : ${result.studentAnswers}" class="mb-4 p-3 border rounded">
                    <h5 th:text="${answer.question.text}" class="fw-bold"></h5>

                    <div th:each="option : ${answer.question.options}" class="p-2 border rounded mb-2"
                        th:classappend="${option.correct} ? 'bg-success text-white' : (${answer.selectedOption != null and answer.selectedOption.id == option.id} ? 'bg-danger text-white' : '')">

                        <div class="d-flex justify-content-between align-items-center">
                            <span th:text="${option.text}"></span>

                            <span th:if="${option.correct}" class="badge bg-light text-success">Correct Answer</span>
                            <span
                                th:if="${answer.selectedOption != null and answer.selectedOption.id == option.id and !option.correct}"
                                class="badge bg-light text-danger">Your Answer</span>
                            <span
                                th:if="${answer.selectedOption != null and answer.selectedOption.id == option.id and option.correct}"
                                class="badge bg-light text-success">Your Answer</span>
                        </div>
                    </div>
                </div>
            </div>

            <a th:href="@{/dashboard}" class="btn btn-outline-primary mt-4">Back to Dashboard</a>
        </div>
    </div>
</body>

</html>
